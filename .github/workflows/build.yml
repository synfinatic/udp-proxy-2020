name: Build Binaries

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]

env:
  LIBPCAP_VERSION: 1.10.3
  FREEBSD_VERSION: 14.2

jobs:
  linux-arm32:
    name: Linux ARM32
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y make git gcc wget \
                gccgo-11-arm-linux-gnueabihf gccgo-11-arm-linux-gnueabi \
                gcc-11-arm-linux-gnueabi-base gcc-11-arm-linux-gnueabihf-base \
                gcc-11-arm-linux-gnueabi gcc-11-arm-linux-gnueabihf \
                binutils-arm-linux-gnueabihf binutils-arm-linux-gnueabi \
                linux-libc-dev-armhf-cross linux-libc-dev-armel-cross \
                libgo21-armhf-cross libgo21-armel-cross \
                libgcc-11-dev-armhf-cross libgcc-11-dev-armel-cross \
                libc6-armhf-cross libc6-armel-cross \
                libc6-dev-armhf-cross libc6-dev-armel-cross

        - name: Install Go
          uses: actions/setup-go@v6
          with:
            go-version-file: 'go.mod'

        - name: Prepare Libpcap build environment
          run: |
            export BASEDIR=$(pwd)/..
            mkdir -p ${BASEDIR}/buildhf/bin && cd ${BASEDIR}/buildhf/bin && \
                ln -s /usr/bin/arm-linux-gnueabihf-gccgo-11 gccgo && \
                ln -s /usr/bin/arm-linux-gnueabihf-gcc-ar-11 ar && \
                ln -s /usr/bin/arm-linux-gnueabihf-gcc-ranlib-11 ranlib && \
                ln -s /usr/bin/arm-linux-gnueabihf-gcc-11 gcc

            mkdir -p ${BASEDIR}/build/bin && cd ${BASEDIR}/build/bin && \
                ln -s /usr/bin/arm-linux-gnueabi-gccgo-11 gccgo && \
                ln -s /usr/bin/arm-linux-gnueabi-gcc-ar-11 ar && \
                ln -s /usr/bin/arm-linux-gnueabi-gcc-ranlib-11 ranlib && \
                ln -s /usr/bin/arm-linux-gnueabi-gcc-11 gcc

            cd ${BASEDIR}
            export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
            wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -

#        - name: Build Libpcap ARM gnueabihf
#          run: |
#            export BASEDIR=$(pwd)/..
#            cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
#            CC=${BASEDIR}/buildhf/bin/gcc BUILD_CC=gcc AR=${BASEDIR}/buildhf/bin/ar  RANLIB=${BASEDIR}/buildhf/bin/ranlib \
#                ./configure --disable-dbus  --prefix=/usr/arm-linux-gnueabihf \
#                --host arm-linux-gnueabihf
#            make
#            sudo make install
#            make clean

        - name: Build Libpcap ARM gnueabi
          run: |
            export BASEDIR=$(pwd)/..
            cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
            CC=${BASEDIR}/build/bin/gcc BUILD_CC=gcc AR=${BASEDIR}/build/bin/ar  RANLIB=${BASEDIR}/build/bin/ranlib \
                ./configure --disable-dbus --prefix=/usr/arm-linux-gnueabi \
                --host arm-linux-gnueabi
            make
            sudo make install
            make clean

        - name: Build ARMv5/6/7 Binary
          run: |
            make .linux-arm32

        # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
        - name: Upload files as artifact
          uses: actions/upload-artifact@v7
          with:
            name: build-files-linux-arm32
            path: dist/udp-proxy-2020*

  linux-aarch64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y make git gcc wget

        - name: Build Libpcap from source
          run: |
            export BASEDIR=$(pwd)
            export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
            wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -

            cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
            ./configure --disable-dbus  --prefix=/usr/aarch64-linux-gnu
            make
            sudo make install

        - name: Build ARM64 Binary
          run: |
            make .linux-arm

        # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
        - name: Upload files as artifact
          uses: actions/upload-artifact@v7
          with:
            name: build-files-linux-arm64
            path: dist/udp-proxy-2020*

  linux-amd64:
    name: Linux x86
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y make git gcc wget 

        - name: Install Go
          uses: actions/setup-go@v6
          with:
            go-version-file: 'go.mod'

        - name: Prepare Libpcap build environment
          run: |
            export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
            wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -

        - name: Build Libpcap x86
          run: |
            cd libpcap-${LIBPCAP_VERSION}
            ./configure --disable-dbus
            make
            sudo make install

        - name: Build x86 Binary
          run: |
            make .linux-amd64

        - name: Create Deb/RPM packages
          run: |
            make package

        # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
        - name: Upload files as artifact
          uses: actions/upload-artifact@v7
          with:
            name: build-files-linux-amd64
            path: dist/udp-proxy-2020*

  linux-mips64:
    name: Linux MIPS64
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y tzdata wget make git flex bison \
                gcc-11-mips64-linux-gnuabi64 \
                linux-libc-dev-mips64-cross \
                gccgo-mips64-linux-gnuabi64 \
                cpp-11-mips64-linux-gnuabi64 \
                gccgo-11-mips64-linux-gnuabi64 \
                libgo16-mips64-cross \
                libgcc-11-dev-mips64-cross \
                libc6-mips64-cross \
                libc6-dev-mips64-cross

        - name: Install Go
          uses: actions/setup-go@v6
          with:
            go-version-file: 'go.mod'

        - name: Prepare Libpcap build environment
          run: |
            export BASEDIR=$(pwd)/..
            cd ${BASEDIR}
            export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
            wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -

        - name: Build Libpcap MIPS64
          run: |
            export BASEDIR=$(pwd)/..
            cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
            CC=mips64-linux-gnuabi64-gcc BUILD_CC=gcc \
            AR=mips64-linux-gnuabi64-gcc-ar  RANLIB=mips64-linux-gnuabi64-ranlib \
            ./configure --host mips64-linux-gnuapbi64 --prefix=/usr/mips64-linux-gnuabi64
            make
            sudo make install

        - name: Run Makefile
          run: |
            make .linux-mips64

        # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
        - name: Upload files as artifact
          uses: actions/upload-artifact@v7
          with:
            name: build-files-linux-mips64
            path: dist/udp-proxy-2020*

  macos:
    name: MacOS ARM64
    runs-on: macos-15 # macos-latest is currently broken?

    steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install Go
          uses: actions/setup-go@v6
          with:
            go-version-file: 'go.mod'

        - name: Install dependencies
          run: |
            brew update
            brew install make libpcap

#        - name: Build Libpcap from source
#          run: |
#            export BASEDIR=$(pwd)
#            export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
#            wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zxf -
#
#            cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
#            ./configure --disable-dbus
#            make
#            sudo make install

        - name: Build Binary
          run: |
            make darwin


        # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
        - name: Upload files as artifact
          uses: actions/upload-artifact@v7
          with:
            name: build-files-darwin
            path: dist/udp-proxy-2020*

  freebsd:
    name: FreeBSD x86/ARM
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v7


        - name: Get project version
          run: echo "PROJECT_VERSION=$(make .print-version)" >> $GITHUB_ENV

        - name: Get FreeBSD Archs
          run: echo "FREEBSD_ARCHES=$(make .print-freebsd-archs)" >> $GITHUB_ENV


        - name: Build in FreeBSD
          # https://github.com/marketplace/actions/freebsd-vm 
          uses: vmactions/freebsd-vm@v1
          with:
            disable-cache: true
            release: '${{ env.FREEBSD_VERSION }}'
            usesh: true
            prepare: |
                pkg install -y wget bash git gmake go libpcap pkgconf pcre2 m4 \
                  aarch64-binutils arm-gnueabi-binutils amd64-binutils \
                  aarch64-freebsd-sysroot amd64-freebsd-sysroot armv7-freebsd-sysroot 
            run: |
                go version
                # fix for "fatal: detected dubious ownership in repository"
                git config --global --add safe.directory /home/runner/work/udp-proxy-2020/udp-proxy-2020
                FREEBSD_VERSION=${{ env.FREEBSD_VERSION }} gmake FREEBSD_ARCHES="${{ env.FREEBSD_ARCHES }}" freebsd-binaries

                # Build .pkg for each arch
                PKG_VERSION="${{ env.PROJECT_VERSION }}"
                FREEBSD_MAJOR=$(echo "${{ env.FREEBSD_VERSION }}" | cut -d. -f1)
                for arch in ${{ env.FREEBSD_ARCHES }}; do
                  case "$arch" in
                    amd64) ABI="freebsd:${FREEBSD_MAJOR}:x86:64" ;;
                    arm64) ABI="freebsd:${FREEBSD_MAJOR}:aarch64:*" ;;
                    armv7) ABI="freebsd:${FREEBSD_MAJOR}:armv7:*" ;;
                    *) echo "Unknown arch: $arch"; exit 1 ;;
                  esac


                  # Explicitly stage all files listed in the manifest
                  mkdir -p stage_${arch}/usr/local/sbin
                  mkdir -p stage_${arch}/usr/local/etc/rc.d
                  mkdir -p stage_${arch}/etc/rc.conf.d

                  cp dist/udp-proxy-2020-${PKG_VERSION}-freebsd-${arch} stage_${arch}/usr/local/sbin/udp-proxy-2020
                  cp startup-scripts/freebsd/usr/local/etc/rc.d/udp-proxy-2020 stage_${arch}/usr/local/etc/rc.d/udp-proxy-2020
                  cp startup-scripts/freebsd/usr/local/etc/udp-proxy-2020.conf.sample stage_${arch}/usr/local/etc/udp-proxy-2020.conf.sample
                  cp startup-scripts/freebsd/etc/rc.conf.d/udp_proxy_2020 stage_${arch}/etc/rc.conf.d/udp_proxy_2020

                  chmod 755 stage_${arch}/usr/local/sbin/udp-proxy-2020
                  chmod 755 stage_${arch}/usr/local/etc/rc.d/udp-proxy-2020
                  chmod 644 stage_${arch}/usr/local/etc/udp-proxy-2020.conf.sample
                  chmod 644 stage_${arch}/etc/rc.conf.d/udp_proxy_2020

                  # ls -lR stage_${arch}

                  m4 -DM4_VERSION="${PKG_VERSION}" -DM4_ABI="${ABI}" startup-scripts/freebsd/pkg-manifest.ucl.m4 > manifest_${arch}.ucl

                  mkdir -p pkg_out_${arch}
                  pkg create -m manifest_${arch}.ucl -r stage_${arch} -o pkg_out_${arch}
                  mv pkg_out_${arch}/udp-proxy-2020-*.pkg dist/udp-proxy-2020-${PKG_VERSION}-freebsd-${arch}.pkg
                done
                pkg add ./dist/udp-proxy-2020-${PKG_VERSION}-freebsd-amd64.pkg || exit 1

        - name: Verify FreeBSD artifacts
          run: |
            ls -l dist/udp-proxy-2020*-freebsd-* || true
            for arch in ${{ env.FREEBSD_ARCHES }}; do
              if ! ls dist/udp-proxy-2020*-freebsd-$arch >/dev/null 2>&1; then
                echo "Missing FreeBSD $arch binary"
                exit 1
              fi
              if ! ls dist/udp-proxy-2020*-freebsd-${arch}.pkg >/dev/null 2>&1; then
                echo "Missing FreeBSD $arch .pkg"
                exit 1
              fi
            done

        - name: Upload files as artifact
          # Artifacts docs: https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts
          uses: actions/upload-artifact@v7
          with:
            name: build-files-freebsd
            path: dist/udp-proxy-2020*
  sign-and-upload-files:
    name: Sign and upload binary files
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    # Wait for binary files to be built
    needs: [linux-arm32, linux-aarch64, linux-amd64, linux-mips64, macos, freebsd]

    steps:
      - name: Download binaries linux-arm32
        uses: actions/download-artifact@v8
        with:
          name: build-files-linux-arm32
          path: dist/

      - name: Download binaries linux-aarch64
        uses: actions/download-artifact@v8
        with:
          name: build-files-linux-aarch64
          path: dist/

      - name: Download binaries linux-amd64
        uses: actions/download-artifact@v8
        with:
          name: build-files-linux-amd64
          path: dist/

      - name: Download binaries linux-mips64
        uses: actions/download-artifact@v8
        with:
          name: build-files-linux-mips64
          path: dist/

      - name: Download binaries macos
        uses: actions/download-artifact@v8
        with:
          name: build-files-macos
          path: dist/

      - name: Download binaries freebsd
        uses: actions/download-artifact@v8
        with:
          name: build-files-freebsd
          path: dist/

      # Source: https://github.com/crazy-max/ghaction-import-gpg
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create signature file
        run: |
          shasum -a 256 dist/* | gpg --clear-sign > dist/release.sig.asc

      # Source: https://github.com/svenstaro/upload-release-action
      - name: Upload all files to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: dist/*
          overwrite: true
          file_glob: true
